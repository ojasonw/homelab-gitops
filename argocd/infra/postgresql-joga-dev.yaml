apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-joga-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: joga-together-dev

  sources:
    - repoURL: 'https://github.com/ojasonw/homelab-gitops.git'
      targetRevision: main
      ref: valuesRepo

    - repoURL: 'https://github.com/ojasonw/homelab-gitops.git'
      targetRevision: main
      path: infra/postgresql/chart
      helm:
        releaseName: postgresql-joga-dev
        valueFiles:
          - $valuesRepo/infra/postgresql/dev-env/values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
