apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-automation-worker
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ia-automation-worker
  template:
    metadata:
      labels:
        app: ia-automation-worker
    spec:
      imagePullSecrets:
        - name: ia-automation-registry
      initContainers:
        - name: db-init
          image: ojasonw/docs-analitics-worker:sha-5faaf2a
          command: ["python3", "/app/scripts/db_init.py"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://ia_worker:$(POSTGRES_PASSWORD)@ia-automation-postgres:5432/ia_pipeline"
            - name: OWNER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: OWNER_USERNAME
            - name: OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: OWNER_PASSWORD
      containers:
        - name: worker
          image: ojasonw/docs-analitics-worker:sha-5faaf2a
          ports:
            - name: http
              containerPort: 8000
          env:
            # --- database ---
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://ia_worker:$(POSTGRES_PASSWORD)@ia-automation-postgres:5432/ia_pipeline"
            # --- auth ---
            - name: WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: WORKER_SECRET
            - name: WEB_SECRET
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: WEB_SECRET
            - name: OWNER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: OWNER_USERNAME
            - name: OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: OWNER_PASSWORD
            # --- gemini ---
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: GEMINI_API_KEY
            # --- n8n ---
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: N8N_API_KEY
            # --- config (non-sensitive) ---
            - name: GOOGLE_SA_PATH
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: GOOGLE_SA_PATH
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: GEMINI_MODEL
            - name: CUSTOMER_TAG
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: CUSTOMER_TAG
            - name: PROMPTS_GITHUB_REPO
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: PROMPTS_GITHUB_REPO
            - name: PROMPTS_GITHUB_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: PROMPTS_GITHUB_BRANCH
            - name: DRIVE_FOLDER_PENDENTE
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: DRIVE_FOLDER_PENDENTE
            - name: DRIVE_FOLDER_PROCESSANDO
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: DRIVE_FOLDER_PROCESSANDO
            - name: DRIVE_FOLDER_PROCESSADO
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: DRIVE_FOLDER_PROCESSADO
            - name: DRIVE_FOLDER_VALIDAR
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: DRIVE_FOLDER_VALIDAR
            - name: DRIVE_FOLDER_ERRO
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: DRIVE_FOLDER_ERRO
            - name: N8N_WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: N8N_WEBHOOK_URL
            - name: N8N_API_URL
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: N8N_API_URL
            - name: APP_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: APP_MAIL_HOST
            - name: APP_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ia-automation-worker-config
                  key: APP_MAIL_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
          volumeMounts:
            - name: worker-logs
              mountPath: /app/logs
            - name: google-sa
              mountPath: /app/secrets/google-sa.json
              subPath: google-sa.json
              readOnly: true
      volumes:
        - name: worker-logs
          persistentVolumeClaim:
            claimName: ia-automation-worker-logs
        - name: google-sa
          secret:
            secretName: ia-automation-secrets
            items:
              - key: GOOGLE_SA_JSON
                path: google-sa.json
