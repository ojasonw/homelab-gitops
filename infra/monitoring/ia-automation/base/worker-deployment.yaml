apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-automation-worker
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ia-automation-worker
  template:
    metadata:
      labels:
        app: ia-automation-worker
    spec:
      imagePullSecrets:
        - name: ia-automation-registry
      containers:
        - name: worker
          image: ojasonw/docs-analitics-worker:sha-6337604
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: GOOGLE_SA_PATH
              value: /app/secrets/google-sa.json
            # DATABASE_URL uses service name — constructed here, password from secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://ia_worker:$(POSTGRES_PASSWORD)@ia-automation-postgres:5432/ia_pipeline"
            # --- all remaining vars from ExternalSecret ---
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: GEMINI_MODEL
            - name: DRIVE_FOLDER_PENDENTE
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: DRIVE_FOLDER_PENDENTE
            - name: DRIVE_FOLDER_PROCESSANDO
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: DRIVE_FOLDER_PROCESSANDO
            - name: DRIVE_FOLDER_PROCESSADO
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: DRIVE_FOLDER_PROCESSADO
            - name: DRIVE_FOLDER_VALIDAR
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: DRIVE_FOLDER_VALIDAR
            - name: DRIVE_FOLDER_ERRO
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: DRIVE_FOLDER_ERRO
            - name: WEB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: WEB_USERNAME
            - name: WEB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: WEB_PASSWORD
            - name: WEB_SECRET
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: WEB_SECRET
            - name: APP_MAIL_USER
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: APP_MAIL_USER
            - name: APP_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: APP_MAIL_PASSWORD
            - name: APP_MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: APP_MAIL_HOST
            - name: APP_MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: APP_MAIL_PORT
            - name: N8N_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: N8N_WEBHOOK_URL
            - name: N8N_API_URL
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: N8N_API_URL
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ia-automation-secrets
                  key: N8N_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
          volumeMounts:
            - name: google-sa
              mountPath: /app/secrets/google-sa.json
              subPath: google-sa.json
              readOnly: true
      volumes:
        - name: google-sa
          secret:
            secretName: ia-automation-secrets
            items:
              - key: GOOGLE_SA_JSON
                path: google-sa.json
