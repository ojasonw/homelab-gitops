apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ia-automation-registry
  namespace: monitoring
spec:
  refreshInterval: 8h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-prod
  target:
    name: ia-automation-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .DOCKERHUB_USERNAME }}","password":"{{ .DOCKERHUB_TOKEN }}","auth":"{{ printf "%s:%s" .DOCKERHUB_USERNAME .DOCKERHUB_TOKEN | b64enc }}"}}}
  data:
    - secretKey: DOCKERHUB_USERNAME
      remoteRef:
        key: /ia-automation/DOCKERHUB_USERNAME
    - secretKey: DOCKERHUB_TOKEN
      remoteRef:
        key: /ia-automation/DOCKERHUB_TOKEN
