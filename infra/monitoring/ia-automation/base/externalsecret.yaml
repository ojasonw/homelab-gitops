apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ia-automation-secrets
  namespace: monitoring
spec:
  refreshInterval: 8h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-prod
  target:
    name: ia-automation-secrets
    creationPolicy: Owner
    template:
      data:
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        GOOGLE_SA_JSON: "{{ .GOOGLE_SA_JSON | b64dec }}"
        GEMINI_API_KEY: "{{ .GEMINI_API_KEY }}"
        GEMINI_MODEL: "{{ .GEMINI_MODEL }}"
        DRIVE_FOLDER_PENDENTE: "{{ .DRIVE_FOLDER_PENDENTE }}"
        DRIVE_FOLDER_PROCESSANDO: "{{ .DRIVE_FOLDER_PROCESSANDO }}"
        DRIVE_FOLDER_PROCESSADO: "{{ .DRIVE_FOLDER_PROCESSADO }}"
        DRIVE_FOLDER_VALIDAR: "{{ .DRIVE_FOLDER_VALIDAR }}"
        DRIVE_FOLDER_ERRO: "{{ .DRIVE_FOLDER_ERRO }}"
        OWNER_USERNAME: "{{ .OWNER_USERNAME }}"
        OWNER_PASSWORD: "{{ .OWNER_PASSWORD }}"
        WEB_SECRET: "{{ .WEB_SECRET }}"
        APP_MAIL_USER: "{{ .APP_MAIL_USER }}"
        APP_MAIL_PASSWORD: "{{ .APP_MAIL_PASSWORD }}"
        APP_MAIL_HOST: "{{ .APP_MAIL_HOST }}"
        APP_MAIL_PORT: "{{ .APP_MAIL_PORT }}"
        N8N_WEBHOOK_URL: "{{ .N8N_WEBHOOK_URL }}"
        N8N_API_URL: "{{ .N8N_API_URL }}"
        N8N_API_KEY: "{{ .N8N_API_KEY }}"
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /ia-automation/POSTGRES_PASSWORD
    - secretKey: GOOGLE_SA_JSON
      remoteRef:
        key: /ia-automation/GOOGLE_SA_JSON
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: /ia-automation/GEMINI_API_KEY
    - secretKey: GEMINI_MODEL
      remoteRef:
        key: /ia-automation/GEMINI_MODEL
    - secretKey: DRIVE_FOLDER_PENDENTE
      remoteRef:
        key: /ia-automation/DRIVE_FOLDER_PENDENTE
    - secretKey: DRIVE_FOLDER_PROCESSANDO
      remoteRef:
        key: /ia-automation/DRIVE_FOLDER_PROCESSANDO
    - secretKey: DRIVE_FOLDER_PROCESSADO
      remoteRef:
        key: /ia-automation/DRIVE_FOLDER_PROCESSADO
    - secretKey: DRIVE_FOLDER_VALIDAR
      remoteRef:
        key: /ia-automation/DRIVE_FOLDER_VALIDAR
    - secretKey: DRIVE_FOLDER_ERRO
      remoteRef:
        key: /ia-automation/DRIVE_FOLDER_ERRO
    - secretKey: OWNER_USERNAME
      remoteRef:
        key: /ia-automation/OWNER_USERNAME
    - secretKey: OWNER_PASSWORD
      remoteRef:
        key: /ia-automation/OWNER_PASSWORD
    - secretKey: WEB_SECRET
      remoteRef:
        key: /ia-automation/WEB_SECRET
    - secretKey: APP_MAIL_USER
      remoteRef:
        key: /ia-automation/APP_MAIL_USER
    - secretKey: APP_MAIL_PASSWORD
      remoteRef:
        key: /ia-automation/APP_MAIL_PASSWORD
    - secretKey: APP_MAIL_HOST
      remoteRef:
        key: /ia-automation/APP_MAIL_HOST
    - secretKey: APP_MAIL_PORT
      remoteRef:
        key: /ia-automation/APP_MAIL_PORT
    - secretKey: N8N_WEBHOOK_URL
      remoteRef:
        key: /ia-automation/N8N_WEBHOOK_URL
    - secretKey: N8N_API_URL
      remoteRef:
        key: /ia-automation/N8N_API_URL
    - secretKey: N8N_API_KEY
      remoteRef:
        key: /ia-automation/N8N_API_KEY
