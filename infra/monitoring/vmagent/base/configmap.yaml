apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: monitoring
data:
  scrape.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'pve'
        metrics_path: /pve
        params:
          module:
            - default
        static_configs:
          - targets:
              - '192.168.15.199'
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: proxmox_host
          - target_label: __address__
            replacement: pve-exporter.monitoring.svc:9221

      - job_name: 'node-exporter'
        static_configs:
          - targets:
              - 'node-exporter.monitoring.svc:9100'

      - job_name: 'vmagent-self'
        static_configs:
          - targets:
              - 'vmagent.monitoring.svc:8429'

      - job_name: 'pihole'
        scrape_interval: 60s
        scrape_timeout: 2m
        static_configs:
          - targets:
              - 'pihole-exporter.monitoring.svc.cluster.local:9617'

      - job_name: 'speedtest'
        scrape_interval: 3h
        scrape_timeout: 5m
        static_configs:
          - targets:
              - 'speedtest-exporter.monitoring.svc:9798'

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets:
              - 'kube-state-metrics.monitoring.svc:8080'

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod

        relabel_configs:

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
