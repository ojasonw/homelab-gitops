apiVersion: apps/v1
kind: Deployment
metadata:
  name: joga-together-backend
spec:
  selector:
    matchLabels:
      app: joga-together-backend
  template:
    metadata:
      labels:
        app: joga-together-backend
    spec:
      containers:
      - name: joga-together-backend
        image: ojasonw/joga-together-backend:v1.0.6
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: joga-together-secrets
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joga-together-frontend
spec:
  selector:
    matchLabels:
      app: joga-together-frontend
  template:
    metadata:
      labels:
        app: joga-together-frontend
    spec:
      containers:
      - name: joga-together-frontend
        image: ojasonw/joga-together-web:v1.0.1
        ports:
        - containerPort: 8081
        # envFrom:
        # - secretRef:
        #     name: joga-together-secrets
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
