# Feeds infra/postgresql/chart via `auth.existingSecret: zuno-app-postgres`.
# The chart's secret.yaml template only renders — with a plaintext password —
# when auth.existingSecret is unset, so this ExternalSecret takes its place.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zuno-app-postgres
spec:
  refreshInterval: 8h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-zuno-app-prod
  target:
    name: zuno-app-postgres
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: POSTGRES_PASSWORD
