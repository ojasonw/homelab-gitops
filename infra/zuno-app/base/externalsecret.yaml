apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zuno-app-secrets
spec:
  refreshInterval: 8h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-zuno-app-prod
  target:
    name: zuno-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        # same Infisical key that backs the postgres StatefulSet's password
        # (see postgres-secret.yaml) — single source of truth, stays in sync
        key: POSTGRES_PASSWORD
    - secretKey: SPRING_JWT_SECRET
      remoteRef:
        key: SPRING_JWT_SECRET
