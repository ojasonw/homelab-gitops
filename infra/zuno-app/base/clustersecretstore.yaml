# ClusterSecretStore is cluster-scoped, but kept here (rather than in the
# shared infra/external-secrets/base/) so zuno-app's Infisical wiring is
# fully self-contained in its own directory.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-zuno-app-prod
spec:
  provider:
    infisical:
      hostAPI: https://us.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: "externalsecrets-i-rq2"
        environmentSlug: "prod"
        secretsPath: "/zuno-app-prod"
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-zuno-app-dev
spec:
  provider:
    infisical:
      hostAPI: https://us.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: "externalsecrets-i-rq2"
        environmentSlug: "dev"
        secretsPath: "/zuno-app-dev"
