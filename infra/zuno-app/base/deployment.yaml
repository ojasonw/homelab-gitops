apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuno-app-backend
spec:
  selector:
    matchLabels:
      app: zuno-app-backend
  template:
    metadata:
      labels:
        app: zuno-app-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: zuno-app-backend
        image: ghcr.io/zuno-webapp/zuno-be:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: zuno-app-config
        - secretRef:
            name: zuno-app-secrets
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuno-app-frontend
spec:
  selector:
    matchLabels:
      app: zuno-app-frontend
  template:
    metadata:
      labels:
        app: zuno-app-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: zuno-app-frontend
        image: ghcr.io/zuno-webapp/zuno-frontend:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
