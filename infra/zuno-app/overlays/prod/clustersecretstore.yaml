# ClusterSecretStore is cluster-scoped, but kept per-overlay (rather than
# base/ or the shared infra/external-secrets/base/) so a validation failure
# in one environment's store can't degrade another's Application health —
# e.g. infisical-zuno-app-dev failing (its Infisical path doesn't exist
# yet) shouldn't affect the prod-only sync.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-zuno-app-prod
spec:
  provider:
    infisical:
      hostAPI: https://us.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: "externalsecrets-i-rq2"
        environmentSlug: "prod"
        secretsPath: "/zuno-app-prod"
