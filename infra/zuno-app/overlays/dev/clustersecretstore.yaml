# See overlays/prod/clustersecretstore.yaml for why this lives per-overlay
# instead of base/.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-zuno-app-dev
spec:
  provider:
    infisical:
      hostAPI: https://us.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-universal-auth
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: "externalsecrets-i-rq2"
        environmentSlug: "dev"
        secretsPath: "/zuno-app-dev"
