auth:
  # Password comes from the zuno-app-postgres Secret (ExternalSecret →
  # Infisical /zuno-app/POSTGRES_PASSWORD), not plaintext here.
  existingSecret: zuno-app-postgres
  database: zuno-db

primary:
  replicaCount: 0

persistence:
  enabled: true
  storageClass: custom-local-path
  size: 8Gi
