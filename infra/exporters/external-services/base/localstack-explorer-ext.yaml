apiVersion: v1
kind: Service
metadata:
  name: localstack-explorer-ext
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 30900
      targetPort: 30900
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: localstack-explorer-ext-manual
  namespace: monitoring
  labels:
    kubernetes.io/service-name: localstack-explorer-ext
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 30900
endpoints:
  - addresses:
      - "192.168.15.202"
