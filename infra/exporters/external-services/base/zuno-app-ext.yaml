apiVersion: v1
kind: Service
metadata:
  name: zuno-app-ext
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 30880
      targetPort: 30880
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: zuno-app-ext-manual
  namespace: monitoring
  labels:
    kubernetes.io/service-name: zuno-app-ext
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 30880
endpoints:
  - addresses:
      - "192.168.15.204"
