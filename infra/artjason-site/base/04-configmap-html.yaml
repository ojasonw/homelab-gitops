        </section>

        <!-- ═══ SERVIÇOS ═══ -->
        <section class="services" id="servicos">
            <div class="container">
                <div class="services-header reveal">
                    <p class="section-label">O que fazemos</p>
                    <h2 class="section-title">Serviços</h2>
                    <p class="section-desc">
                        Cobertura completa: do helpdesk à engenharia de infraestrutura.
                    </p>
                </div>
                <div class="services-grid">
                    <div class="service-card reveal">
                        <div class="service-icon">01</div>
                        <h3>Consultoria de TI</h3>
                        <p>Diagnóstico, planejamento e estruturação do ambiente de tecnologia da sua empresa. Análise de maturidade e roadmap evolutivo.</p>
                    </div>
                    <div class="service-card reveal">
                        <div class="service-icon">02</div>
                        <h3>Suporte Técnico</h3>
                        <p>Suporte remoto e presencial para estações, servidores e rede. Atendimento rápido com SLA definido e escalonamento claro.</p>
                    </div>
                    <div class="service-card reveal">
                        <div class="service-icon">03</div>
                        <h3>Infraestrutura & Redes</h3>
                        <p>Projeto, implantação e gestão de redes LAN/WAN, switches, roteadores, firewalls e políticas de segmentação.</p>
                    </div>
                    <div class="service-card reveal">
                        <div class="service-icon">04</div>
                        <h3>Monitoramento Avançado</h3>
                        <p>Visibilidade ponto a ponto da infraestrutura com alertas proativos, dashboards em tempo real e análise de tendências.</p>
                    </div>
                    <div class="service-card reveal">
                        <div class="service-icon">05</div>
                        <h3>Segurança</h3>
                        <p>Hardening de servidores, gestão de firewall, políticas de acesso, auditoria de vulnerabilidades e resposta a incidentes.</p>
                    </div>
                    <div class="service-card reveal">
                        <div class="service-icon">06</div>
                        <h3>Cloud & Backup</h3>
                        <p>Migração para nuvem, gestão de ambientes híbridos, estratégias de backup e planos de disaster recovery testados.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- ═══ CONTATO ═══ -->
        <section class="contact" id="contato">
            <div class="container">
                <div class="contact-grid">
                    <div class="reveal">
                        <p class="section-label">Contato</p>
                        <h2 class="section-title">Vamos conversar<br>sobre seu projeto.</h2>
                        <p class="section-desc">
                            Conte o que precisa. Sem burocracia, sem enrolação.
                        </p>
                        <div class="contact-info-list">
                            <div class="contact-item">
                                <div class="contact-item-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 4-10 8L2 4"/></svg>
                                </div>
                                <div class="contact-item-text">
                                    <span>E-mail</span>
                                    <p>jwl.tech@outlook.com.br</p>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-item-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                </div>
                                <div class="contact-item-text">
                                    <span>Telefone</span>
                                    <p>(11) 96911-0562</p>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-item-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                </div>
                                <div class="contact-item-text">
                                    <span>Localização</span>
                                    <p>São Paulo, SP</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="reveal">
                        <div class="form-group form-row">
                            <div>
                                <label class="form-label" for="name">Nome</label>
                                <input type="text" id="name" class="form-input" placeholder="Seu nome">
                            </div>
                            <div>
                                <label class="form-label" for="email">E-mail</label>
                                <input type="email" id="email" class="form-input" placeholder="seu@email.com">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="subject">Assunto</label>
                            <input type="text" id="subject" class="form-input" placeholder="Como podemos ajudar?">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="message">Mensagem</label>
                            <textarea id="message" class="form-textarea" placeholder="Descreva sua necessidade..."></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" id="submitBtn">
                            Enviar mensagem
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ═══ FOOTER ═══ -->
        <footer class="footer">
            <div class="container">
                <p class="footer-text">© 2026 JWL TECH. Todos os direitos reservados.</p>
                <ul class="footer-links">
                    <li><a href="#hero">Início</a></li>
                    <li><a href="#sobre">Sobre</a></li>
                    <li><a href="#servicos">Serviços</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
            </div>
        </footer>

        <!-- ═══ JAVASCRIPT ═══ -->
        <script>
            // Navbar scroll effect
            const navbar = document.getElementById('navbar');
            let lastScroll = 0;

            window.addEventListener('scroll', () => {
                const currentScroll = window.scrollY;
                if (currentScroll > 60) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
                lastScroll = currentScroll;
            });

            // Mobile menu toggle
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');

            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });

            // Close mobile menu on link click
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('active');
                });
            });

            // Scroll reveal
            const revealElements = document.querySelectorAll('.reveal');

            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, index * 80);
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '0px 0px -40px 0px'
            });

            revealElements.forEach(el => revealObserver.observe(el));

            // Form submit
            document.getElementById('submitBtn').addEventListener('click', async () => {
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const message = document.getElementById('message').value.trim();
                const btn = document.getElementById('submitBtn');

                if (!name || !email || !message) {
                    alert('Por favor, preencha os campos obrigatórios.');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Enviando...';

                try {
                    const res = await fetch('https://n8n.artjason.com/webhook/contact-form', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, subject, message })
                    });

                    if (res.ok) {
                        alert('Mensagem enviada! Entraremos em contato em breve.');
                        document.getElementById('name').value = '';
                        document.getElementById('email').value = '';
                        document.getElementById('subject').value = '';
                        document.getElementById('message').value = '';
                    } else {
                        alert('Erro ao enviar. Tente novamente.');
                    }
                } catch (e) {
                    alert('Erro ao enviar. Verifique sua conexão.');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = 'Enviar mensagem <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
                }
            });

            // Smooth scroll for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        </script>
    </body>
    </html>
