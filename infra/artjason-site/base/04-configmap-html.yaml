data:
  index.html: |
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JWL TECH — Consultoria de TI</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            /* ═══════════════════════════════════════
               RESET & VARIABLES
            ═══════════════════════════════════════ */
            *, *::before, *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --bg-primary: #0a0a0f;
                --bg-secondary: #0f0f18;
                --bg-card: #12121e;
                --bg-card-hover: #181828;
                --text-primary: #e8e8ef;
                --text-secondary: #7a7a8e;
                --text-muted: #4a4a5e;
                --accent: #00e5a0;
                --accent-dim: rgba(0, 229, 160, 0.08);
                --accent-glow: rgba(0, 229, 160, 0.15);
                --accent-secondary: #00b8d4;
                --border: rgba(255, 255, 255, 0.06);
                --border-hover: rgba(0, 229, 160, 0.2);
                --font-display: 'Outfit', sans-serif;
                --font-mono: 'JetBrains Mono', monospace;
                --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            }

            html {
                scroll-behavior: smooth;
                scrollbar-width: thin;
                scrollbar-color: var(--accent) var(--bg-primary);
            }

            body {
                font-family: var(--font-display);
                background: var(--bg-primary);
                color: var(--text-primary);
                line-height: 1.6;
                overflow-x: hidden;
                -webkit-font-smoothing: antialiased;
            }

            ::selection {
                background: var(--accent);
                color: var(--bg-primary);
            }

            /* ═══════════════════════════════════════
               NOISE OVERLAY
            ═══════════════════════════════════════ */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 9999;
            }

            /* ═══════════════════════════════════════
               LAYOUT
            ═══════════════════════════════════════ */
            .container {
                max-width: 1140px;
                margin: 0 auto;
                padding: 0 24px;
            }

            section {
                padding: 120px 0;
            }

            /* ═══════════════════════════════════════
               NAVBAR
            ═══════════════════════════════════════ */
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
                padding: 20px 0;
                transition: all 0.4s var(--ease-out);
                background: transparent;
            }

            .navbar.scrolled {
                background: rgba(10, 10, 15, 0.85);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border);
                padding: 14px 0;
            }

            .navbar .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .logo {
                font-family: var(--font-mono);
                font-size: 1.2rem;
                font-weight: 700;
                color: var(--text-primary);
                text-decoration: none;
                letter-spacing: -0.02em;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .logo-dot {
                width: 8px;
                height: 8px;
                background: var(--accent);
                border-radius: 50%;
                display: inline-block;
                box-shadow: 0 0 12px var(--accent-glow);
                animation: pulse-dot 2.5s ease-in-out infinite;
            }

            @keyframes pulse-dot {
                0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent-glow); }
                50% { opacity: 0.6; box-shadow: 0 0 4px var(--accent-glow); }
            }

            .nav-links {
                display: flex;
                align-items: center;
                gap: 36px;
                list-style: none;
            }

            .nav-links a {
                font-family: var(--font-mono);
                font-size: 0.78rem;
                color: var(--text-secondary);
                text-decoration: none;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                transition: color 0.3s ease;
                position: relative;
            }

            .nav-links a::after {
                content: '';
                position: absolute;
                bottom: -4px;
                left: 0;
                width: 0;
                height: 1px;
                background: var(--accent);
                transition: width 0.3s var(--ease-out);
            }

            .nav-links a:hover {
                color: var(--accent);
            }

            .nav-links a:hover::after {
                width: 100%;
            }

            .menu-toggle {
                display: none;
                flex-direction: column;
                gap: 5px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 4px;
            }

            .menu-toggle span {
                width: 22px;
                height: 1.5px;
                background: var(--text-primary);
                transition: all 0.3s ease;
            }

            /* ═══════════════════════════════════════
               HERO
            ═══════════════════════════════════════ */
            .hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                position: relative;
                padding-top: 80px;
            }

            .hero-grid-bg {
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
                background-size: 60px 60px;
                mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
                -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
            }

            .hero-glow {
                position: absolute;
                top: -20%;
                left: 50%;
                transform: translateX(-50%);
                width: 800px;
                height: 600px;
                background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 60%);
                pointer-events: none;
                opacity: 0.4;
            }

            .hero-content {
                position: relative;
                z-index: 1;
            }

            .hero-tag {
                font-family: var(--font-mono);
                font-size: 0.78rem;
                color: var(--accent);
                letter-spacing: 0.12em;
                text-transform: uppercase;
                margin-bottom: 28px;
                display: flex;
                align-items: center;
                gap: 12px;
                opacity: 0;
                animation: fadeUp 0.8s var(--ease-out) 0.2s forwards;
            }

            .hero-tag::before {
                content: '';
                width: 32px;
                height: 1px;
                background: var(--accent);
            }

            .hero-title {
                font-size: clamp(2.8rem, 6vw, 4.8rem);
                font-weight: 700;
                line-height: 1.08;
                letter-spacing: -0.03em;
                margin-bottom: 28px;
                opacity: 0;
                animation: fadeUp 0.8s var(--ease-out) 0.4s forwards;
            }

            .hero-title .highlight {
                color: var(--accent);
                position: relative;
            }

            .hero-desc {
                font-size: 1.1rem;
                color: var(--text-secondary);
                max-width: 520px;
                line-height: 1.7;
                margin-bottom: 48px;
                font-weight: 300;
                opacity: 0;
                animation: fadeUp 0.8s var(--ease-out) 0.6s forwards;
            }

            .hero-actions {
                display: flex;
                gap: 16px;
                align-items: center;
                opacity: 0;
                animation: fadeUp 0.8s var(--ease-out) 0.8s forwards;
            }

            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* ═══════════════════════════════════════
               BUTTONS
            ═══════════════════════════════════════ */
            .btn {
                font-family: var(--font-mono);
                font-size: 0.82rem;
                letter-spacing: 0.04em;
                padding: 14px 32px;
                border: none;
                cursor: pointer;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                transition: all 0.3s var(--ease-out);
            }

            .btn-primary {
                background: var(--accent);
                color: var(--bg-primary);
                font-weight: 600;
                position: relative;
                overflow: hidden;
            }

            .btn-primary:hover {
                box-shadow: 0 0 30px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.3);
                transform: translateY(-1px);
            }

            .btn-ghost {
                background: transparent;
                color: var(--text-secondary);
                border: 1px solid var(--border);
            }

            .btn-ghost:hover {
                color: var(--accent);
                border-color: var(--border-hover);
                background: var(--accent-dim);
            }

            /* ═══════════════════════════════════════
               SECTION HEADERS
            ═══════════════════════════════════════ */
            .section-label {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--accent);
                text-transform: uppercase;
                letter-spacing: 0.14em;
                margin-bottom: 16px;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .section-label::before {
                content: '';
                width: 24px;
                height: 1px;
                background: var(--accent);
            }

            .section-title {
                font-size: clamp(1.8rem, 3.5vw, 2.6rem);
                font-weight: 600;
                letter-spacing: -0.02em;
                margin-bottom: 20px;
                line-height: 1.15;
            }

            .section-desc {
                color: var(--text-secondary);
                font-size: 1rem;
                max-width: 540px;
                line-height: 1.7;
                font-weight: 300;
            }

            /* ═══════════════════════════════════════
               SOBRE
            ═══════════════════════════════════════ */
            .about {
                background: var(--bg-secondary);
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }

            .about-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 80px;
                align-items: center;
            }

            .about-stats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px;
                margin-top: 48px;
            }

            .stat-card {
                padding: 24px;
                border: 1px solid var(--border);
                background: var(--bg-card);
                transition: all 0.3s ease;
            }

            .stat-card:hover {
                border-color: var(--border-hover);
                background: var(--bg-card-hover);
            }

            .stat-number {
                font-family: var(--font-mono);
                font-size: 2rem;
                font-weight: 700;
                color: var(--accent);
                line-height: 1;
                margin-bottom: 6px;
            }

            .stat-label {
                font-size: 0.82rem;
                color: var(--text-muted);
                font-family: var(--font-mono);
                letter-spacing: 0.02em;
            }

            .about-visual {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .terminal-window {
                width: 100%;
                background: var(--bg-card);
                border: 1px solid var(--border);
                overflow: hidden;
                font-family: var(--font-mono);
                font-size: 0.82rem;
            }

            .terminal-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 14px 18px;
                border-bottom: 1px solid var(--border);
            }

            .terminal-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
            }

            .terminal-dot:nth-child(1) { background: #ff5f57; }
            .terminal-dot:nth-child(2) { background: #febc2e; }
            .terminal-dot:nth-child(3) { background: #28c840; }

            .terminal-body {
                padding: 20px;
                line-height: 1.9;
                color: var(--text-secondary);
            }

            .terminal-body .prompt {
                color: var(--accent);
            }

            .terminal-body .cmd {
                color: var(--text-primary);
            }

            .terminal-body .output {
                color: var(--text-muted);
                padding-left: 8px;
            }

            .terminal-cursor {
                display: inline-block;
                width: 8px;
                height: 16px;
                background: var(--accent);
                vertical-align: text-bottom;
                animation: blink 1s step-end infinite;
            }

            @keyframes blink {
                50% { opacity: 0; }
            }

            /* ═══════════════════════════════════════
               SERVIÇOS
            ═══════════════════════════════════════ */
            .services-header {
                text-align: center;
                margin-bottom: 64px;
            }

            .services-header .section-label {
                justify-content: center;
            }

            .services-header .section-label::before { display: none; }
            .services-header .section-label::after {
                content: '';
                width: 24px;
                height: 1px;
                background: var(--accent);
            }

            .services-header .section-desc {
                margin: 0 auto;
            }

            .services-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }

            .service-card {
                padding: 40px 32px;
                border: 1px solid var(--border);
                background: var(--bg-card);
                transition: all 0.4s var(--ease-out);
                position: relative;
                overflow: hidden;
            }

            .service-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent), transparent);
                opacity: 0;
                transition: opacity 0.4s ease;
            }

            .service-card:hover {
                border-color: var(--border-hover);
                background: var(--bg-card-hover);
                transform: translateY(-4px);
            }

            .service-card:hover::before {
                opacity: 1;
            }

            .service-icon {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--accent);
                padding: 8px 14px;
                border: 1px solid var(--accent);
                display: inline-block;
                margin-bottom: 28px;
                letter-spacing: 0.06em;
                background: var(--accent-dim);
            }

            .service-card h3 {
                font-size: 1.15rem;
                font-weight: 600;
                margin-bottom: 14px;
                letter-spacing: -0.01em;
            }

            .service-card p {
                font-size: 0.92rem;
                color: var(--text-secondary);
                line-height: 1.65;
                font-weight: 300;
            }

            /* ═══════════════════════════════════════
               CONTATO
            ═══════════════════════════════════════ */
            .contact {
                background: var(--bg-secondary);
                border-top: 1px solid var(--border);
            }

            .contact-grid {
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 80px;
                align-items: start;
            }

            .contact-info-list {
                margin-top: 40px;
                display: flex;
                flex-direction: column;
                gap: 24px;
            }

            .contact-item {
                display: flex;
                align-items: center;
                gap: 16px;
            }

            .contact-item-icon {
                width: 44px;
                height: 44px;
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                color: var(--accent);
                font-size: 1rem;
            }

            .contact-item-text span {
                display: block;
                font-size: 0.72rem;
                font-family: var(--font-mono);
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 2px;
            }

            .contact-item-text p {
                color: var(--text-secondary);
                font-size: 0.95rem;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-label {
                display: block;
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 8px;
            }

            .form-input,
            .form-textarea {
                width: 100%;
                padding: 14px 18px;
                background: var(--bg-card);
                border: 1px solid var(--border);
                color: var(--text-primary);
                font-family: var(--font-display);
                font-size: 0.95rem;
                outline: none;
                transition: border-color 0.3s ease;
            }

            .form-input:focus,
            .form-textarea:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-dim);
            }

            .form-input::placeholder,
            .form-textarea::placeholder {
                color: var(--text-muted);
            }

            .form-textarea {
                resize: vertical;
                min-height: 120px;
            }

            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            /* ═══════════════════════════════════════
               FOOTER
            ═══════════════════════════════════════ */
            .footer {
                padding: 32px 0;
                border-top: 1px solid var(--border);
            }

            .footer .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .footer-text {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--text-muted);
                letter-spacing: 0.04em;
            }

            .footer-links {
                display: flex;
                gap: 24px;
                list-style: none;
            }

            .footer-links a {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--text-muted);
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .footer-links a:hover {
                color: var(--accent);
            }

            /* ═══════════════════════════════════════
               SCROLL ANIMATIONS
            ═══════════════════════════════════════ */
            .reveal {
                opacity: 0;
                transform: translateY(30px);
                transition: all 0.7s var(--ease-out);
            }

            .reveal.visible {
                opacity: 1;
                transform: translateY(0);
            }

            /* ═══════════════════════════════════════
               RESPONSIVE
            ═══════════════════════════════════════ */
            @media (max-width: 968px) {
                .about-grid {
                    grid-template-columns: 1fr;
                    gap: 48px;
                }

                .services-grid {
                    grid-template-columns: 1fr 1fr;
                }

                .contact-grid {
                    grid-template-columns: 1fr;
                    gap: 48px;
                }
            }

            @media (max-width: 640px) {
                section { padding: 80px 0; }

                .nav-links { display: none; }

                .menu-toggle { display: flex; }

                .nav-links.active {
                    display: flex;
                    flex-direction: column;
                    position: absolute;
                    top: 100%;
                    left: 0;
                    right: 0;
                    background: rgba(10, 10, 15, 0.95);
                    backdrop-filter: blur(20px);
                    padding: 24px;
                    gap: 20px;
                    border-bottom: 1px solid var(--border);
                }

                .services-grid {
                    grid-template-columns: 1fr;
                }

                .about-stats {
                    grid-template-columns: 1fr 1fr;
                }

                .form-row {
                    grid-template-columns: 1fr;
                }

                .hero-actions {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .footer .container {
                    flex-direction: column;
                    gap: 16px;
                    text-align: center;
                }
            }
        </style>
    </head>
    <body>

        <!-- ═══ NAVBAR ═══ -->
        <nav class="navbar" id="navbar">
            <div class="container">
                <a href="#" class="logo">
                    <span class="logo-dot"></span>
                    JWL TECH
                </a>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#sobre">Sobre</a></li>
                    <li><a href="#servicos">Serviços</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
                <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>

        <!-- ═══ HERO ═══ -->
        <section class="hero" id="hero">
            <div class="hero-grid-bg"></div>
            <div class="hero-glow"></div>
            <div class="container">
                <div class="hero-content">
                    <p class="hero-tag">Consultoria &amp; Infraestrutura de TI</p>
                    <h1 class="hero-title">
                        Tecnologia que<br>
                        funciona com<br>
                        <span class="highlight">precisão.</span>
                    </h1>
                    <p class="hero-desc">
                        Do suporte operacional ao monitoramento avançado de
                        infraestrutura ponto a ponto. Sua TI sob controle, sem ruído.
                    </p>
                    <div class="hero-actions">
                        <a href="#contato" class="btn btn-primary">
                            Fale conosco
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </a>
                        <a href="#servicos" class="btn btn-ghost">Ver serviços</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- ═══ SOBRE ═══ -->
        <section class="about" id="sobre">
            <div class="container">
                <div class="about-grid">
                    <div class="reveal">
                        <p class="section-label">Sobre nós</p>
                        <h2 class="section-title">Infraestrutura sólida.<br>Operação previsível.</h2>
                        <p class="section-desc">
                            A JWL TECH atua em consultoria de TI cobrindo desde o
                            básico — suporte, diagnóstico, estruturação — até
                            monitoramento avançado com visibilidade completa da sua
                            infraestrutura. Trabalhamos para que problemas sejam
                            identificados antes de virarem incidentes.
                        </p>
                        <div class="about-stats">
                            <div class="stat-card">
                                <div class="stat-number">24/7</div>
                                <div class="stat-label">Monitoramento</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">P2P</div>
                                <div class="stat-label">Visibilidade</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">99.9%</div>
                                <div class="stat-label">Uptime alvo</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">&lt;15m</div>
                                <div class="stat-label">Tempo resposta</div>
                            </div>
                        </div>
                    </div>
                    <div class="about-visual reveal">
                        <div class="terminal-window">
                            <div class="terminal-header">
                                <div class="terminal-dot"></div>
                                <div class="terminal-dot"></div>
                                <div class="terminal-dot"></div>
                            </div>
                            <div class="terminal-body">
                                <div><span class="prompt">jwl@monitor</span> <span class="cmd">~ $ check-infra --status</span></div>
                                <div class="output">▸ Rede: ██████████ 100% operacional</div>
                                <div class="output">▸ Servidores: ██████████ todos online</div>
                                <div class="output">▸ Firewall: ██████████ regras atualizadas</div>
                                <div class="output">▸ Backup: ██████████ último: 2h atrás</div>
                                <br>
                                <div><span class="prompt">jwl@monitor</span> <span class="cmd">~ $ uptime</span></div>
                                <div class="output">▸ 247 dias, 14:32:08 sem interrupções</div>
