apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack-explorer
  namespace: dev
  labels:
    app: localstack-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack-explorer
  template:
    metadata:
      labels:
        app: localstack-explorer
    spec:
      containers:
        - name: localstack-explorer
          image: fgiova/localstack-explorer:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: LOCALSTACK_ENDPOINT
              value: "http://localstack:4566"
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
