apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-node-config
  namespace: monitoring
data:
  scrape.yml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'node'
        static_configs:
          - targets:
              - 'node-exporter.monitoring.svc:9100'
            labels:
              instance: PLACEHOLDER

    remote_write:
      - url: http://192.168.15.201:30428/api/v1/write
