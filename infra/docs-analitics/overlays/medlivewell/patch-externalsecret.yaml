    # Secrets do cliente Medlivewell — path base já configurado no Infisical
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /docs-analitics/POSTGRES_PASSWORD
    - secretKey: WORKER_SECRET
      remoteRef:
        key: /docs-analitics/WORKER_SECRET
    - secretKey: GOOGLE_SA_JSON
      remoteRef:
        key: /docs-analitics/GOOGLE_SA_JSON
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: /docs-analitics/GEMINI_API_KEY
    - secretKey: WEB_SECRET
      remoteRef:
        key: /docs-analitics/WEB_SECRET
    - secretKey: OWNER_USERNAME
      remoteRef:
        key: /docs-analitics/OWNER_USERNAME
    - secretKey: OWNER_PASSWORD
      remoteRef:
        key: /docs-analitics/OWNER_PASSWORD
    - secretKey: N8N_API_KEY
      remoteRef:
        key: /docs-analitics/N8N_API_KEY
    - secretKey: PROMPTS_GITHUB_TOKEN
      remoteRef:
        key: /docs-analitics/PROMPTS_GITHUB_TOKEN
