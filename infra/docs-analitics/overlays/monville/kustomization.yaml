apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: docs-analitics-monville

resources:
  - ../../base

patches:
  - path: worker-configmap-patch.yaml
    target:
      kind: ConfigMap
      name: docs-analitics-worker-config
  - path: worker-service-patch.yaml
    target:
      kind: Service
      name: docs-analitics-worker
