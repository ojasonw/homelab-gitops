apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docs-analitics-secrets
spec:
  data:
    # Secrets específicos do cliente Monville — criar em /docs-analitics-monville/ no Infisical
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /docs-analitics-monville/POSTGRES_PASSWORD
    - secretKey: WORKER_SECRET
      remoteRef:
        key: /docs-analitics-monville/WORKER_SECRET
    - secretKey: GOOGLE_SA_JSON
      remoteRef:
        key: /docs-analitics-monville/GOOGLE_SA_JSON
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: /docs-analitics-monville/GEMINI_API_KEY
    - secretKey: WEB_SECRET
      remoteRef:
        key: /docs-analitics-monville/WEB_SECRET
    - secretKey: OWNER_USERNAME
      remoteRef:
        key: /docs-analitics-monville/OWNER_USERNAME
    - secretKey: OWNER_PASSWORD
      remoteRef:
        key: /docs-analitics-monville/OWNER_PASSWORD
    - secretKey: N8N_API_KEY
      remoteRef:
        key: /docs-analitics-monville/N8N_API_KEY
    # Token compartilhado — lido do path base
    - secretKey: PROMPTS_GITHUB_TOKEN
      remoteRef:
        key: /docs-analitics/PROMPTS_GITHUB_TOKEN
