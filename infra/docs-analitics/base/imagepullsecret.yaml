apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docs-analitics-registry
  namespace: docs-analitics
spec:
  refreshInterval: 8h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-prod
  target:
    name: docs-analitics-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .DOCKERHUB_USERNAME }}","password":"{{ .DOCKERHUB_TOKEN }}","auth":"{{ printf "%s:%s" .DOCKERHUB_USERNAME .DOCKERHUB_TOKEN | b64enc }}"}}}
  data:
    - secretKey: DOCKERHUB_USERNAME
      remoteRef:
        key: /docs-analitics/DOCKERHUB_USERNAME
    - secretKey: DOCKERHUB_TOKEN
      remoteRef:
        key: /docs-analitics/DOCKERHUB_TOKEN
