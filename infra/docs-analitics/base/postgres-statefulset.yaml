apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docs-analitics-postgres
  namespace: docs-analitics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-analitics-postgres
  serviceName: docs-analitics-postgres
  template:
    metadata:
      labels:
        app: docs-analitics-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "ia_pipeline"
            - name: POSTGRES_USER
              value: "ia_worker"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docs-analitics-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ia_worker", "-d", "ia_pipeline"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: docs-analitics-postgres-data
        - name: init-sql
          configMap:
            name: docs-analitics-postgres-init
